name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow does not consume any user-controlled inputs from
# github.event.*; all inputs are checkout-time files. Safe by construction.

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install --upgrade uv
      - name: Install
        run: uv pip install --system -e '.[dev]'
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install uv && uv pip install --system -e '.[dev]'
      - name: Mypy
        run: mypy

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install uv && uv pip install --system -e '.[dev]'
      - name: Pytest
        run: pytest -v --cov=chatvault --cov-report=term-missing
